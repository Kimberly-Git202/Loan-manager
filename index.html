<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JML LIMITED | Professional</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div id="login-overlay" class="auth-overlay">
        <div class="auth-card">
            <h2>JML LIMITED</h2>
            <p>Access Secure Registry</p>
            <input type="email" id="login-email" placeholder="Work Email">
            <input type="password" id="login-password" placeholder="Password">
            <button onclick="handleLogin()">Login</button>
        </div>
    </div>

    <div class="app-container">
        <nav class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <span class="logo">JML LIMITED</span>
                <i class="fas fa-arrow-left" onclick="toggleSidebar()" style="cursor:pointer"></i>
            </div>
            <ul>
                <li onclick="showSection('list-sec')" class="nav-item active"><i class="fas fa-users"></i> <span>Client Registry</span></li>
                <li onclick="showSection('loans-summary-sec')" class="nav-item"><i class="fas fa-chart-line"></i> <span>Financials</span></li>
                <li onclick="showSection('add-client-sec')" class="nav-item"><i class="fas fa-user-plus"></i> <span>Add Client</span></li>
                <li onclick="handleLogout()" class="nav-item"><i class="fas fa-sign-out-alt"></i> <span>Logout</span></li>
            </ul>
        </nav>

        <main class="main-content">
            <header class="top-header">
                <i class="fas fa-bars menu-trigger" onclick="toggleSidebar()"></i>
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="globalSearch" oninput="searchClients()" placeholder="Search clients...">
                </div>
            </header>

            <section id="list-sec" class="content-section">
                <div class="table-container">
                    <table class="styled-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th>Client Name</th>
                                <th>Contact</th>
                                <th>Balance</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="clientTableBody"></tbody>
                    </table>
                </div>
            </section>

            <section id="loans-summary-sec" class="content-section hidden">
                <div class="finance-grid">
                    <div class="stat-card"><h3>Total Outstanding</h3><h2 id="grand-total-out">0</h2></div>
                    <div class="stat-card"><h3>Recovered</h3><h2 id="grand-total-paid">0</h2></div>
                </div>
            </section>

            <section id="add-client-sec" class="content-section hidden">
                <div class="table-container" style="padding: 20px;">
                    <h2>New Enrollment</h2>
                    <form id="clientForm">
                        <input type="text" id="f-name" placeholder="Full Name" required style="width:100%; padding:10px; margin-bottom:10px;">
                        <input type="number" id="f-loan" placeholder="Loan Amount" required style="width:100%; padding:10px; margin-bottom:10px;">
                        <input type="date" id="f-start" required style="width:100%; padding:10px; margin-bottom:10px;">
                        <button type="submit" class="view-btn" style="width:100%; padding:15px;">Save Client</button>
                    </form>
                </div>
            </section>
        </main>
    </div>

    <div id="detailWindow" class="modal hidden">
        <div class="modal-content">
             <span class="close-x" onclick="closeDetails()" style="float:right; cursor:pointer">&times; Close</span>
             <h2 id="d-name">Client Name</h2>
             <hr>
             <p>Principal: <span id="d-principal">0</span></p>
             <p>Balance: <input type="number" id="d-bal-input" onchange="saveManualBalance()"></p>
             <div class="table-scroll">
                 <table class="activity-table" style="width:100%">
                     <thead><tr><th>Date</th><th>Time</th><th>By</th></tr></thead>
                     <tbody id="activityTableBody"></tbody>
                 </table>
             </div>
             <div class="payment-action-card">
                 <input type="number" id="dailyPay" placeholder="KSh">
                 <button onclick="updatePayment()">Pay</button>
             </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
