<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JML Loan Manager | Professional Financial Suite</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="auth-container" class="hidden">
        <div class="login-card">
            <h2>JML Loan Manager</h2>
            <input type="email" id="login-email" placeholder="Email">
            <input type="password" id="login-password" placeholder="Password">
            <button onclick="handleLogin()">Access Terminal</button>
        </div>
    </div>

    <div id="app-container">
        <aside class="sidebar">
            <div class="logo">JML MANAGER</div>
            <nav>
                <ul id="main-nav">
                    <li data-view="clients" class="active"><i class="fa fa-users"></i> Clients</li>
                    <li data-view="enroll"><i class="fa fa-user-plus"></i> Enroll Client</li>
                    <li data-view="financials"><i class="fa fa-chart-line"></i> Financials</li>
                    <li data-view="loans"><i class="fa fa-file-invoice-dollar"></i> Loans</li>
                    <li data-view="settled"><i class="fa fa-check-circle"></i> Settled Loans</li>
                    <li data-view="debts"><i class="fa fa-exclamation-triangle"></i> Debts</li>
                    <li data-view="settings"><i class="fa fa-cog"></i> Settings</li>
                    <li data-view="modes"><i class="fa fa-adjust"></i> Modes</li>
                    <li data-view="reports"><i class="fa fa-clipboard-list"></i> Reports</li>
                </ul>
            </nav>
            <div class="user-info">
                <span id="current-user-role">Employee</span>
                <button onclick="logout()">Logout</button>
            </div>
        </aside>

        <main class="content">
            <header class="top-bar">
                <h1 id="view-title">Clients</h1>
                <div id="search-container">
                    <input type="text" id="global-search" placeholder="Search by Name or ID..." onkeyup="filterTable()">
                </div>
            </header>

            <section id="view-port">
                </section>
        </main>
    </div>

    <div id="modal-overlay" class="hidden">
        <div class="modal-content">
            <div id="modal-body"></div>
            <div class="modal-actions">
                <button id="modal-confirm" class="btn-confirm">Confirm</button>
                <button onclick="closeModal()" class="btn-cancel">Cancel</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
