<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JML Loan Manager</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
</head>
<body data-theme="light">
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">JML LOANS</div>
            <ul class="nav-menu" id="sidebar-nav">
                <li data-module="clients" class="active">Clients</li>
                <li data-module="enroll">Enroll Client</li>
                <li data-module="financials">Financials</li>
                <li data-module="loans">Loans</li>
                <li data-module="settled">Settled Loans</li>
                <li data-module="debts">Debts</li>
                <li data-module="settings">Settings</li>
                <li data-module="modes">Modes</li>
                <li data-module="reports">Reports</li>
            </ul>
            <div class="user-section">
                <div id="user-info"></div>
                <button id="logout-btn" class="btn btn-danger">Logout</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header>
                <h1 id="page-title">Clients</h1>
                <div class="search-bar">
                    <input type="text" id="global-search" placeholder="Search clients by name or ID..." onkeyup="if(event.key==='Enter') filterClients()">
                </div>
                <button onclick="toggleTheme()" class="btn theme-btn">🌙</button>
            </header>
            <div id="content-area"></div>
        </main>
    </div>

    <!-- Modal -->
    <div id="modal" class="modal">
        <div class="modal-content" id="modal-content"></div>
    </div>

    <script src="app.js"></script>
</body>
</html>
