<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JML LOAN MANAGER</title>

<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
</head>

<body id="body">

<!-- LOGIN -->
<div id="login">
<h2>Login</h2>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

<div class="sidebar">
<h2>JML SYSTEM</h2>

<div onclick="show('clients')">Clients</div>
<div onclick="show('enroll')">Enroll Client</div>
<div onclick="show('financials')">Financials</div>
<div onclick="show('loans')">Loans</div>
<div onclick="show('settled')">Settled Loans</div>
<div onclick="show('debts')">Debts</div>
<div onclick="show('reports')">Reports</div>
<div onclick="toggleMode()">Themes</div>
<div onclick="logout()">Logout</div>

</div>

<div class="main">

<input placeholder="Search..." onkeyup="search(this.value)">

<!-- CLIENTS -->
<div id="clients" class="section">
<h2>Clients</h2>
<table>
<thead>
<tr>
<th>#</th><th>Name</th><th>ID</th><th>Phone</th><th>Paid</th><th>Balance</th>
</tr>
</thead>
<tbody id="clientTable"></tbody>
</table>
</div>

<!-- ENROLL -->
<div id="enroll" class="section hidden">
<h2>Enroll Client</h2>

<input id="name" placeholder="Full Name">
<input id="id" placeholder="ID Number">
<input id="phone" placeholder="Phone">
<input id="location" placeholder="Location">
<input id="occupation" placeholder="Occupation">
<input id="referral" placeholder="Referral">
<input id="amount" placeholder="Loan Amount">

<button onclick="addClient()">Save Client</button>
</div>

<!-- FINANCIALS -->
<div id="financials" class="section hidden">
<h2>Financials</h2>

<input type="month" id="month" onchange="calcMonth()">
<input type="number" id="year" placeholder="Year" onchange="calcYear()">

<p>Total Out: <span id="out"></span></p>
<p>Total Paid: <span id="paid"></span></p>
<p>Monthly: <span id="monthly"></span></p>
<p>Yearly: <span id="yearly"></span></p>
</div>

<!-- LOANS -->
<div id="loans" class="section hidden">
<h2>Loans by Month & Week</h2>

<input type="month" id="loanMonth" onchange="filterLoans()">

<select id="week" onchange="filterLoans()">
<option value="all">All Weeks</option>
<option value="1">Week 1</option>
<option value="2">Week 2</option>
<option value="3">Week 3</option>
<option value="4">Week 4</option>
</select>

<div id="loanList"></div>
</div>

<!-- SETTLED -->
<div id="settled" class="section hidden">
<h2>Settled Loans</h2>
<div id="settledList"></div>
</div>

<!-- DEBTS -->
<div id="debts" class="section hidden">
<h2>Debts</h2>
<div id="debtList"></div>
</div>

<!-- REPORTS -->
<div id="reports" class="section hidden">
<h2>Employee Reports</h2>
<div id="reportList"></div>
</div>

</div>
</div>

<script src="script.js"></script>
</body>
</html>
